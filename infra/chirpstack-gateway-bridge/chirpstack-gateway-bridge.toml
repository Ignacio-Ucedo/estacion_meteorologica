# ChirpStack Gateway Bridge v4 — modo Semtech UDP Packet Forwarder
# El ESP32 single-channel gateway apunta UDP a la IP del host en puerto 1700
# Referencia: https://www.chirpstack.io/docs/chirpstack-gateway-bridge/configuration.html

[integration]
marshaler = "json"

[integration.mqtt]
event_topic_template   = "eu433/gateway/{{ .GatewayID }}/event/{{ .EventType }}"
state_topic_template   = "eu433/gateway/{{ .GatewayID }}/state/{{ .StateType }}"
command_topic_template = "eu433/gateway/{{ .GatewayID }}/command/#"
server                 = "tcp://mosquitto:1883/"

[backend]
type = "semtech_udp"

[backend.semtech_udp]
udp_bind = ":1700"
